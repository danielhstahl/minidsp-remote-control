pid INSTALL_DIRECTORY/minidsp/nginx/nginx.pid;
events {
	worker_connections 768;
	# multi_accept on;
}
http {
    proxy_buffering off;
    client_body_buffer_size 10m;
    client_max_body_size    10m;
    client_body_temp_path INSTALL_DIRECTORY/minidsp/nginx/;
    proxy_temp_path INSTALL_DIRECTORY/minidsp/nginx/;
    access_log INSTALL_DIRECTORY/minidsp/nginx/access.log;
    server {
        listen 80;
        server_name HOSTNAME;
        include INSTALL_DIRECTORY/minidsp/nginx/whitelist.conf;
        deny all;
        root INSTALL_DIRECTORY/minidsp/dist;
        index index.html;
        include INSTALL_DIRECTORY/minidsp/nginx/mime.types;
        # Reverse Proxy Rules
        location ~ ^/api/power(/.*)?$ {
            proxy_pass http://localhost:8000;  # Forward to local service, include /api/power
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ ^/api/device(/.*)?$ {
            proxy_pass http://localhost:8000;  # Forward to local service, include /api/device
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ ^/api/cert(/.*)?$ {
            proxy_pass http://localhost:8000;  # Forward to local service, include /api/cert
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/ {
            proxy_pass http://localhost:5380/;  # Forward to local service, stripping off /api
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # for browser routes
        location / {
            try_files $uri /index.html;
        }
    }

    server {
        listen 443 ssl;
        server_name HOSTNAME;
        ssl_certificate INSTALL_DIRECTORY/minidsp/ssl/device.crt;
        ssl_certificate_key INSTALL_DIRECTORY/minidsp/ssl/device.key;
        root INSTALL_DIRECTORY/minidsp/dist;
        index index.html;
        include INSTALL_DIRECTORY/minidsp/nginx/mime.types;
        # Restrict to local network
        include INSTALL_DIRECTORY/minidsp/nginx/whitelist.conf;
        deny all;
        # Reverse Proxy Rules
        location ~ ^/api/power(/.*)?$ {
            proxy_pass http://localhost:8000;  # Forward to local service, include /api/power
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ ^/api/device(/.*)?$ {
            proxy_pass http://localhost:8000;  # Forward to local service, include /api/device
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location ~ ^/api/cert(/.*)?$ {
            proxy_pass http://localhost:8000;  # Forward to local service, include /api/cert
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/ {
            proxy_pass http://localhost:5380/;  # Forward to local service, stripping off /api
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # for browser routes
        location / {
            try_files $uri /index.html;
        }
    }
}
